name: Python package publish

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish-to:
        description: "Select destination repository"
        required: true
        default: "both"
        type: choice
        options:
          - testpypi
          - pypi
          - both

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build release distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.publish-to == 'testpypi' ||
      inputs.publish-to == 'both'
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/project/git-raf/
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-testpypi
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.publish-to == 'pypi' ||
      inputs.publish-to == 'both') &&
      (needs.publish-testpypi.result == 'success' || needs.publish-testpypi.result == 'skipped')
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/git-raf/
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
